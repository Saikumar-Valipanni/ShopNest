<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
</head>
<body>

<div class="sn-auth-page">
  <div class="sn-auth-card">

    <!-- Logo -->
    <div class="sn-auth-logo">Shop<span>Nest</span></div>
    <div class="sn-auth-title">Create your account and start shopping</div>

    <!-- Error message -->
    <div class="sn-alert-error"
         th:if="${errorMessage}"
         th:text="${errorMessage}">
    </div>

    <!-- Register Form -->
    <form th:action="@{/register}" method="post"
          th:object="${user}">

      <div class="sn-form-group">
        <label class="sn-form-label" for="name">
          <i class="bi bi-person me-1"></i>Full Name
        </label>
        <input type="text"
               id="name"
               th:field="*{name}"
               class="sn-form-input"
               placeholder="John Doe"
               required autofocus>
      </div>

      <div class="sn-form-group">
        <label class="sn-form-label" for="email">
          <i class="bi bi-envelope me-1"></i>Email Address
        </label>
        <input type="email"
               id="email"
               th:field="*{email}"
               class="sn-form-input"
               placeholder="you@example.com"
               required>
      </div>

      <div class="sn-form-group">
        <label class="sn-form-label" for="password">
          <i class="bi bi-lock me-1"></i>Password
        </label>
        <input type="password"
               id="password"
               th:field="*{password}"
               class="sn-form-input"
               placeholder="Minimum 6 characters"
               minlength="6"
               required>
      </div>

      <button type="submit" class="sn-submit-btn">
        Create Account <i class="bi bi-arrow-right ms-1"></i>
      </button>

    </form>

    <div class="sn-auth-switch">
      Already have an account?
      <a th:href="@{/login}">Sign in</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

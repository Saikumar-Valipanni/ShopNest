<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
</head>
<body>

<div class="sn-auth-page">
  <div class="sn-auth-card">

    <!-- Logo -->
    <div class="sn-auth-logo">Shop<span>Nest</span></div>
    <div class="sn-auth-title">Welcome back! Sign in to continue</div>

    <!-- Success message after register -->
    <div class="sn-alert-success"
         th:if="${successMessage}"
         th:text="${successMessage}">
    </div>

    <!-- Error message on login fail -->
    <div class="sn-alert-error" th:if="${param.error}">
      Invalid email or password. Please try again.
    </div>

    <!-- Logout message -->
    <div class="sn-alert-success" th:if="${param.logout}">
      You have been logged out successfully.
    </div>

    <!-- Login Form -->
    <!-- Spring Security handles POST /login automatically -->
    <form th:action="@{/login}" method="post">

      <div class="sn-form-group">
        <label class="sn-form-label" for="username">
          <i class="bi bi-envelope me-1"></i>Email address
        </label>
        <input type="email"
               id="username"
               name="username"
               class="sn-form-input"
               placeholder="you@example.com"
               required autofocus>
      </div>

      <div class="sn-form-group">
        <label class="sn-form-label" for="password">
          <i class="bi bi-lock me-1"></i>Password
        </label>
        <input type="password"
               id="password"
               name="password"
               class="sn-form-input"
               placeholder="Enter your password"
               required>
      </div>

      <button type="submit" class="sn-submit-btn">
        Sign In <i class="bi bi-arrow-right ms-1"></i>
      </button>

    </form>

    <div class="sn-auth-switch">
      Don't have an account?
      <a th:href="@{/register}">Create one</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

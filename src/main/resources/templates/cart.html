<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="sn-page">
  <div class="container">

    <!-- Page title -->
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h2 style="font-family:var(--font-display); font-weight:700; margin-bottom:4px;">
          My Cart
        </h2>
        <p style="color:#a8a49c; font-size:14px; margin:0;"
           th:text="${#lists.size(cartItems)} + ' item(s) in your cart'">
        </p>
      </div>
      <a th:href="@{/}" style="color:#1a5c38; font-size:14px; font-weight:500;">
        <i class="bi bi-arrow-left me-1"></i> Continue Shopping
      </a>
    </div>

    <!-- Flash messages -->
    <div class="sn-alert-success"
         th:if="${successMessage}"
         th:text="${successMessage}">
    </div>

    <!-- Empty cart -->
    <div th:if="${#lists.isEmpty(cartItems)}"
         class="sn-cart-empty">
      <i class="bi bi-bag"></i>
      <h3>Your cart is empty</h3>
      <p>Looks like you haven't added anything yet.</p>
      <a th:href="@{/}" class="sn-btn-primary mt-3 d-inline-block">
        Start Shopping
      </a>
    </div>

    <!-- Cart content -->
    <div class="row g-4"
         th:if="${!#lists.isEmpty(cartItems)}">

      <!-- Cart Items -->
      <div class="col-lg-8">

        <!-- Each item -->
        <div class="sn-cart-item"
             th:each="item : ${cartItems}">

          <!-- Product image -->
          <img class="sn-cart-item-img"
               th:src="${item.product.imageUrl}"
               th:alt="${item.product.name}"
               onerror="this.src='https://picsum.photos/seed/product/400/300'">

          <!-- Product info -->
          <div class="sn-cart-item-info">
            <div class="sn-cart-item-name"
                 th:text="${item.product.name}">Product Name</div>
            <div class="sn-cart-item-price"
                 th:text="'₹' + ${#numbers.formatDecimal(item.product.price, 1, 'COMMA', 0, 'POINT')} + ' each'">
            </div>
            <div class="mt-2">
              <span class="sn-stock-badge sn-in-stock"
                    th:text="${item.product.category.name}">
              </span>
            </div>
          </div>

          <!-- Quantity control -->
          <form th:action="@{/cart/update}" method="post"
                class="d-flex align-items-center gap-2">
            <input type="hidden" name="cartItemId"
                   th:value="${item.id}">
            <div class="sn-qty-control">
              <button type="submit" name="quantity"
                      th:value="${item.quantity - 1}"
                      class="sn-qty-btn">−</button>
              <span class="sn-qty-input"
                    th:text="${item.quantity}">1</span>
              <button type="submit" name="quantity"
                      th:value="${item.quantity + 1}"
                      class="sn-qty-btn">+</button>
            </div>
          </form>

          <!-- Subtotal -->
          <div class="sn-cart-item-subtotal">
            ₹<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 0, 'POINT')}">0</span>
          </div>

          <!-- Remove button -->
          <form th:action="@{/cart/remove}" method="post">
            <input type="hidden" name="cartItemId"
                   th:value="${item.id}">
            <button type="submit" class="sn-remove-btn"
                    title="Remove item">
              <i class="bi bi-trash"></i>
            </button>
          </form>

        </div>
        <!-- End each item -->

      </div>
      <!-- End cart items col -->

      <!-- Order Summary -->
      <div class="col-lg-4">
        <div class="sn-cart-summary">
          <div class="sn-summary-title">Order Summary</div>

          <!-- Item rows -->
          <div th:each="item : ${cartItems}">
            <div class="sn-summary-row">
              <span th:text="${item.product.name}"
                    style="max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
              </span>
              <span th:text="'×' + ${item.quantity}"></span>
            </div>
          </div>

          <hr style="border-color:#e8e6e0; margin: 12px 0;">

          <div class="sn-summary-row">
            <span>Subtotal</span>
            <span th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 'COMMA', 0, 'POINT')}"></span>
          </div>

          <div class="sn-summary-row">
            <span>Shipping</span>
            <span style="color:#1a5c38; font-weight:600;">Free</span>
          </div>

          <div class="sn-summary-total">
            <span>Total</span>
            <span th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 'COMMA', 0, 'POINT')}"></span>
          </div>

		  <a th:href="@{/checkout}" class="sn-checkout-btn"
		     style="display:block; text-align:center; text-decoration:none;">
		    <i class="bi bi-bag-check me-2"></i>Proceed to Checkout
		  </a>

          <!-- Clear cart -->
          <form th:action="@{/cart/clear}" method="post">
            <button type="submit" class="sn-clear-btn">
              <i class="bi bi-trash me-1"></i>Clear Cart
            </button>
          </form>

        </div>
      </div>
      <!-- End summary col -->

    </div>
    <!-- End row -->

  </div>
</div>

<!-- Footer -->
<footer class="sn-footer">
  <div class="container">
    <div class="sn-footer-bottom">
      © 2024 ShopNest. All rights reserved.
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

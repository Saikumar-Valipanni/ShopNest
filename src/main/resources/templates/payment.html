<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
  <style>
    .pay-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 32px;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: var(--shadow-md);
    }
    .pay-method-btn {
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      cursor: pointer;
      transition: var(--transition);
      background: white;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .pay-method-btn.active {
      border-color: var(--green);
      background: var(--green-light);
    }
    .pay-method-btn:hover { border-color: var(--green-mid); }
    .pay-section {
      background: var(--gray-100);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-top: 16px;
    }
    .card-input {
      width: 100%;
      padding: 11px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      background: white;
      font-family: var(--font-body);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      letter-spacing: 1px;
    }
    .card-input:focus { border-color: var(--green-mid); }
    .processing-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .processing-box {
      background: white;
      border-radius: var(--radius-lg);
      padding: 40px;
      text-align: center;
      max-width: 320px;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid var(--green-light);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 16px;
    }
  </style>
</head>
<body>

<!-- Processing overlay -->
<div class="processing-overlay" id="processingOverlay">
  <div class="processing-box">
    <div class="spinner"></div>
    <h5 style="font-family:var(--font-display); margin-bottom:8px;">
      Processing Payment
    </h5>
    <p style="color:var(--gray-400); font-size:14px; margin:0;">
      Please wait, do not close this window...
    </p>
  </div>
</div>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="sn-page">
  <div class="container">

    <!-- Progress -->
    <div class="d-flex align-items-center gap-3 mb-4"
         style="font-size:13px; font-weight:600; max-width:480px; margin:0 auto 24px;">
      <span style="color:var(--green);">
        <i class="bi bi-check-circle-fill me-1"></i>Cart
      </span>
      <span style="color:var(--gray-400);">──────</span>
      <span style="color:var(--green);">
        <i class="bi bi-check-circle-fill me-1"></i>Shipping
      </span>
      <span style="color:var(--gray-400);">──────</span>
      <span style="color:var(--green);">
        <i class="bi bi-circle-fill me-1" style="font-size:8px;"></i>Payment
      </span>
      <span style="color:var(--gray-400);">──────</span>
      <span style="color:var(--gray-400);">Confirmed</span>
    </div>

    <div class="pay-card">
      <h5 style="font-family:var(--font-display);
                 font-weight:600; margin-bottom:8px;">
        Complete Payment
      </h5>
      <p style="font-size:14px; color:var(--gray-400); margin-bottom:20px;">
        Amount to pay:
        <strong style="color:var(--green-dark); font-size:18px;">
          ₹<span th:text="${#numbers.formatDecimal(cartTotal, 1, 'COMMA', 0, 'POINT')}">0</span>
        </strong>
      </p>

      <!-- Payment method tabs -->
      <button type="button" class="pay-method-btn active"
              onclick="showMethod('card')">
        <i class="bi bi-credit-card-2-front"
           style="font-size:20px; color:var(--green);"></i>
        <div>
          <div style="font-weight:600; font-size:14px;">Credit / Debit Card</div>
          <div style="font-size:12px; color:var(--gray-400);">Visa, Mastercard, Rupay</div>
        </div>
      </button>

      <button type="button" class="pay-method-btn"
              onclick="showMethod('upi')">
        <i class="bi bi-phone"
           style="font-size:20px; color:var(--green);"></i>
        <div>
          <div style="font-weight:600; font-size:14px;">UPI</div>
          <div style="font-size:12px; color:var(--gray-400);">Google Pay, PhonePe, Paytm</div>
        </div>
      </button>

      <button type="button" class="pay-method-btn"
              onclick="showMethod('cod')">
        <i class="bi bi-cash-stack"
           style="font-size:20px; color:var(--green);"></i>
        <div>
          <div style="font-weight:600; font-size:14px;">Cash on Delivery</div>
          <div style="font-size:12px; color:var(--gray-400);">Pay when order arrives</div>
        </div>
      </button>

      <!-- Card form -->
      <div class="pay-section" id="cardSection">
        <div style="font-size:12px; font-weight:600;
                    color:var(--gray-600); margin-bottom:12px;">
          CARD DETAILS
        </div>
        <input type="text" class="card-input"
               placeholder="Card Number (16 digits)"
               maxlength="19" id="cardNumber"
               oninput="formatCard(this)">
        <div class="row g-2">
          <div class="col-6">
            <input type="text" class="card-input"
                   placeholder="MM / YY" maxlength="5"
                   id="cardExpiry" oninput="formatExpiry(this)">
          </div>
          <div class="col-6">
            <input type="text" class="card-input"
                   placeholder="CVV" maxlength="3">
          </div>
        </div>
        <input type="text" class="card-input"
               placeholder="Name on Card">
      </div>

      <!-- UPI form -->
      <div class="pay-section" id="upiSection" style="display:none;">
        <div style="font-size:12px; font-weight:600;
                    color:var(--gray-600); margin-bottom:12px;">
          UPI ID
        </div>
        <input type="text" class="card-input"
               placeholder="yourname@upi" style="letter-spacing:normal;">
      </div>

      <!-- COD section -->
      <div class="pay-section" id="codSection" style="display:none;">
        <div style="color:var(--gray-600); font-size:14px;">
          <i class="bi bi-info-circle me-2"
             style="color:var(--green);"></i>
          Pay with cash when your order is delivered to your door.
          No online payment required.
        </div>
      </div>

      <!-- Hidden form to submit order -->
      <form th:action="@{/checkout/place-order}"
            method="post" id="orderForm">
        <input type="hidden" name="fullName"
               th:value="${fullName}">
        <input type="hidden" name="phone"
               th:value="${phone}">
        <input type="hidden" name="address"
               th:value="${address}">
        <input type="hidden" name="city"
               th:value="${city}">
        <input type="hidden" name="pincode"
               th:value="${pincode}">
      </form>

      <button class="sn-submit-btn mt-3" onclick="processPayment()">
        <i class="bi bi-lock-fill me-2"></i>
        Pay ₹<span th:text="${#numbers.formatDecimal(cartTotal, 1, 'COMMA', 0, 'POINT')}">0</span>
      </button>

      <div class="secure-badge">
        <i class="bi bi-shield-check"></i>
        100% Secure Payment · SSL Encrypted
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function showMethod(method) {
    document.getElementById('cardSection').style.display = 'none';
    document.getElementById('upiSection').style.display = 'none';
    document.getElementById('codSection').style.display = 'none';
    document.querySelectorAll('.pay-method-btn')
            .forEach(b => b.classList.remove('active'));
    document.getElementById(method + 'Section').style.display = 'block';
    event.currentTarget.classList.add('active');
  }

  function formatCard(input) {
    let val = input.value.replace(/\D/g, '').substring(0, 16);
    input.value = val.replace(/(.{4})/g, '$1 ').trim();
  }

  function formatExpiry(input) {
    let val = input.value.replace(/\D/g, '').substring(0, 4);
    if (val.length >= 2) val = val.substring(0,2) + ' / ' + val.substring(2);
    input.value = val;
  }

  function processPayment() {
    // show processing animation
    const overlay = document.getElementById('processingOverlay');
    overlay.style.display = 'flex';

    // simulate payment processing — submit after 2.5 seconds
    setTimeout(function() {
      document.getElementById('orderForm').submit();
    }, 2500);
  }
</script>
</body>
</html>

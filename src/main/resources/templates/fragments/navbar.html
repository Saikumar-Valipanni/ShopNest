<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top sn-navbar">
  <div class="container">

    <!-- Brand -->
    <a class="navbar-brand sn-brand" th:href="@{/}">
      Shop<span>Nest</span>
    </a>

    <!-- Mobile toggle -->
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">

      <!-- Search bar -->
      <form class="d-flex mx-auto sn-search-form"
            th:action="@{/search}" method="get">
        <div class="input-group">
          <input class="form-control sn-search-input"
                 type="search" name="keyword"
                 placeholder="Search products...">
          <button class="btn sn-search-btn" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>

      <!-- Nav links -->
      <ul class="navbar-nav ms-auto align-items-center gap-2">

        <!-- Categories dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle sn-nav-link"
             href="#" data-bs-toggle="dropdown">
            Categories
          </a>
          <ul class="dropdown-menu sn-dropdown">
            <li th:each="cat : ${categories}">
              <a class="dropdown-item sn-dropdown-item"
                 th:href="@{/category/{id}(id=${cat.id})}"
                 th:text="${cat.name}">Category</a>
            </li>
          </ul>
        </li>

        <!-- Guest links -->
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="btn sn-btn-outline" th:href="@{/login}">Login</a>
        </li>
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="btn sn-btn-primary" th:href="@{/register}">Register</a>
        </li>

        <!-- Logged in links -->
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <span class="sn-greeting">
            Hi, <span sec:authentication="name"></span>
          </span>
        </li>

        <!-- Cart icon with badge -->
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="sn-cart-btn" th:href="@{/cart}">
            <i class="bi bi-bag"></i>
            Cart
          </a>
        </li>

        <!-- Admin link -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="btn sn-btn-outline" th:href="@{/admin}">
            <i class="bi bi-shield-check"></i> Admin
          </a>
        </li>

        <!-- Logout -->
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn sn-btn-logout">
              Logout
            </button>
          </form>
        </li>

      </ul>
    </div>
  </div>
</nav>
</html>

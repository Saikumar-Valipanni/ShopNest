<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="sn-page">
  <div class="container">

    <div class="d-flex align-items-center mb-4">
      <h2 style="font-family:var(--font-display);font-weight:700;margin:0;">
        Checkout
      </h2>
    </div>

    <!-- Progress steps -->
    <div class="d-flex align-items-center gap-3 mb-4"
         style="font-size:13px; font-weight:600;">
      <span style="color:var(--green);">
        <i class="bi bi-check-circle-fill me-1"></i>Cart
      </span>
      <span style="color:var(--gray-400);">──────</span>
      <span style="color:var(--green);">
        <i class="bi bi-circle-fill me-1" style="font-size:8px;"></i>Shipping
      </span>
      <span style="color:var(--gray-400);">──────</span>
      <span style="color:var(--gray-400);">Payment</span>
      <span style="color:var(--gray-400);">──────</span>
      <span style="color:var(--gray-400);">Confirmed</span>
    </div>

    <div class="row g-4">

      <!-- Shipping Form -->
      <div class="col-lg-7">
        <div style="background:white; border:1px solid var(--gray-200);
                    border-radius:var(--radius-lg); padding:28px;">
          <h5 style="font-family:var(--font-display);
                     font-weight:600; margin-bottom:20px;">
            Shipping Details
          </h5>

          <form th:action="@{/checkout/payment}" method="post">

            <div class="sn-form-group">
              <label class="sn-form-label">Full Name</label>
              <input type="text" name="fullName"
                     class="sn-form-input"
                     placeholder="Enter your full name" required>
            </div>

            <div class="sn-form-group">
              <label class="sn-form-label">Phone Number</label>
              <input type="tel" name="phone"
                     class="sn-form-input"
                     placeholder="10 digit mobile number"
                     pattern="[0-9]{10}" required>
            </div>

            <div class="sn-form-group">
              <label class="sn-form-label">Full Address</label>
              <textarea name="address"
                        class="sn-form-input"
                        rows="3"
                        placeholder="House no, Street, Locality"
                        style="resize:none;" required></textarea>
            </div>

            <div class="row g-3">
              <div class="col-7">
                <div class="sn-form-group">
                  <label class="sn-form-label">City</label>
                  <input type="text" name="city"
                         class="sn-form-input"
                         placeholder="City" required>
                </div>
              </div>
              <div class="col-5">
                <div class="sn-form-group">
                  <label class="sn-form-label">Pincode</label>
                  <input type="text" name="pincode"
                         class="sn-form-input"
                         placeholder="6 digit pincode"
                         pattern="[0-9]{6}" required>
                </div>
              </div>
            </div>

            <button type="submit" class="sn-submit-btn">
              Continue to Payment
              <i class="bi bi-arrow-right ms-2"></i>
            </button>

          </form>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-5">
        <div class="sn-cart-summary">
          <div class="sn-summary-title">Order Summary</div>

          <div th:each="item : ${cartItems}">
            <div class="sn-summary-row">
              <span th:text="${item.product.name}"
                    style="max-width:180px; overflow:hidden;
                           text-overflow:ellipsis; white-space:nowrap;">
              </span>
              <span th:text="'×' + ${item.quantity}"></span>
            </div>
          </div>

          <hr style="border-color:var(--gray-200);">

          <div class="sn-summary-row">
            <span>Subtotal</span>
            <span th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 'COMMA', 0, 'POINT')}"></span>
          </div>
          <div class="sn-summary-row">
            <span>Shipping</span>
            <span style="color:var(--green); font-weight:600;">Free</span>
          </div>
          <div class="sn-summary-total">
            <span>Total</span>
            <span th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 'COMMA', 0, 'POINT')}"></span>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
  <style>
    .success-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .success-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--gray-200);
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: popIn 0.4s ease;
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .order-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray-200);
      font-size: 14px;
    }
    .order-detail-row:last-child { border-bottom: none; }
    .order-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      font-size: 14px;
      border-bottom: 1px solid var(--gray-200);
    }
    .order-item-row:last-child { border-bottom: none; }
  </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="success-page">
  <div class="success-card">

    <!-- Success icon -->
    <div class="success-icon">
      <i class="bi bi-check-lg"
         style="font-size:36px; color:var(--green);"></i>
    </div>

    <h2 style="font-family:var(--font-display);
               font-weight:700; margin-bottom:8px;">
      Order Confirmed!
    </h2>
    <p style="color:var(--gray-400); margin-bottom:28px;">
      Thank you for shopping with ShopNest.
      Your order has been placed successfully.
    </p>

    <!-- Order info -->
    <div th:if="${order != null}"
         style="background:var(--gray-100); border-radius:var(--radius-md);
                padding:20px; margin-bottom:24px; text-align:left;">

      <div style="font-size:12px; font-weight:600;
                  color:var(--gray-600); margin-bottom:12px;
                  letter-spacing:0.05em;">
        ORDER DETAILS
      </div>

      <div class="order-detail-row">
        <span style="color:var(--gray-600);">Order ID</span>
        <span style="font-weight:600;"
              th:text="'#SN' + ${order.id}"></span>
      </div>
      <div class="order-detail-row">
        <span style="color:var(--gray-600);">Deliver to</span>
        <span style="font-weight:600;"
              th:text="${order.fullName}"></span>
      </div>
      <div class="order-detail-row">
        <span style="color:var(--gray-600);">City</span>
        <span th:text="${order.city}"></span>
      </div>
      <div class="order-detail-row">
        <span style="color:var(--gray-600);">Payment</span>
        <span style="color:var(--green); font-weight:600;">
          <i class="bi bi-check-circle-fill me-1"></i>Paid
        </span>
      </div>
      <div class="order-detail-row">
        <span style="color:var(--gray-600);">Items ordered</span>
        <span th:text="${#lists.size(order.orderItems)} + ' items'"></span>
      </div>

      <!-- Order items -->
      <div style="margin-top:12px; padding-top:12px;
                  border-top:1px solid var(--gray-200);"
           th:each="item : ${order.orderItems}">
        <div class="order-item-row">
          <span th:text="${item.product.name}"
                style="font-weight:500;"></span>
          <span style="color:var(--gray-400);"
                th:text="'×' + ${item.quantity}"></span>
          <span style="font-weight:600; color:var(--green-dark);"
                th:text="'₹' + ${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 0, 'POINT')}">
          </span>
        </div>
      </div>

      <!-- Total -->
      <div style="display:flex; justify-content:space-between;
                  padding-top:14px; font-size:17px; font-weight:700;">
        <span>Total Paid</span>
        <span style="color:var(--green-dark);"
              th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT')}">
        </span>
      </div>

    </div>

    <!-- If no order in flash -->
    <div th:if="${order == null}"
         style="background:var(--green-light); border-radius:var(--radius-md);
                padding:20px; margin-bottom:24px;">
      <p style="color:var(--green-dark); margin:0; font-size:14px;">
        Your order has been placed successfully!
        Check your order history for details.
      </p>
    </div>

    <div class="d-flex gap-3 justify-content-center">
      <a th:href="@{/}" class="sn-btn-primary">
        Continue Shopping
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

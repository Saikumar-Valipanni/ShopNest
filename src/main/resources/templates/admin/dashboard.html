<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <i class="bi bi-shield-check me-2"></i>Admin Panel
    </div>
    <nav class="admin-nav">
      <a th:href="@{/admin}"
         class="admin-nav-link active">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a th:href="@{/admin/categories}"
         class="admin-nav-link">
        <i class="bi bi-tag"></i> Categories
      </a>
      <a th:href="@{/admin/products}"
         class="admin-nav-link">
        <i class="bi bi-box-seam"></i> Products
      </a>
      <a th:href="@{/}"
         class="admin-nav-link">
        <i class="bi bi-shop"></i> View Store
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="admin-main">

    <div class="admin-page-header">
      <h2 class="admin-page-title">Dashboard</h2>
      <p class="admin-page-sub">Welcome back, Admin</p>
    </div>

    <!-- Flash messages -->
    <div class="sn-alert-success"
         th:if="${successMessage}"
         th:text="${successMessage}">
    </div>

    <!-- Stats cards -->
    <div class="row g-3 mb-4">

      <div class="col-md-4">
        <div class="admin-stat-card">
          <div class="admin-stat-icon green">
            <i class="bi bi-tag"></i>
          </div>
          <div class="admin-stat-info">
            <div class="admin-stat-number"
                 th:text="${totalCategories}">0</div>
            <div class="admin-stat-label">Total Categories</div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="admin-stat-card">
          <div class="admin-stat-icon blue">
            <i class="bi bi-box-seam"></i>
          </div>
          <div class="admin-stat-info">
            <div class="admin-stat-number"
                 th:text="${totalProducts}">0</div>
            <div class="admin-stat-label">Total Products</div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="admin-stat-card">
          <div class="admin-stat-icon amber">
            <i class="bi bi-people"></i>
          </div>
          <div class="admin-stat-info">
            <div class="admin-stat-number">—</div>
            <div class="admin-stat-label">Total Users</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Quick actions -->
    <div class="admin-section-title">Quick Actions</div>
    <div class="row g-3">
      <div class="col-md-6">
        <a th:href="@{/admin/categories/add}"
           class="admin-action-card">
          <i class="bi bi-plus-circle"
             style="font-size:28px; color:var(--green);"></i>
          <div>
            <div style="font-weight:600; font-size:15px;">
              Add Category
            </div>
            <div style="font-size:13px; color:var(--gray-400);">
              Create a new product category
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a th:href="@{/admin/products/add}"
           class="admin-action-card">
          <i class="bi bi-plus-circle"
             style="font-size:28px; color:var(--green);"></i>
          <div>
            <div style="font-weight:600; font-size:15px;">
              Add Product
            </div>
            <div style="font-size:13px; color:var(--gray-400);">
              Add a new product to the store
            </div>
          </div>
        </a>
      </div>
    </div>

    <!-- Categories list preview -->
    <div class="admin-section-title mt-4">Categories</div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Image URL</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}"></td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <img th:src="${cat.imageUrl}"
                     style="width:36px; height:36px;
                            border-radius:8px; object-fit:cover;">
                <span th:text="${cat.name}"
                      style="font-weight:500;"></span>
              </div>
            </td>
            <td>
              <span th:text="${cat.imageUrl}"
                    style="font-size:12px; color:var(--gray-400);
                           max-width:200px; overflow:hidden;
                           text-overflow:ellipsis; white-space:nowrap;
                           display:block;">
              </span>
            </td>
            <td>
              <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                 class="admin-btn-edit">
                <i class="bi bi-pencil"></i> Edit
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${isEdit} ? 'Edit Product' : 'Add Product'">Product Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-layout">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <i class="bi bi-shield-check me-2"></i>Admin Panel
    </div>
    <nav class="admin-nav">
      <a th:href="@{/admin}" class="admin-nav-link">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a th:href="@{/admin/categories}" class="admin-nav-link">
        <i class="bi bi-tag"></i> Categories
      </a>
      <a th:href="@{/admin/products}"
         class="admin-nav-link active">
        <i class="bi bi-box-seam"></i> Products
      </a>
      <a th:href="@{/}" class="admin-nav-link">
        <i class="bi bi-shop"></i> View Store
      </a>
    </nav>
  </aside>

  <main class="admin-main">

    <div class="admin-page-header">
      <div>
        <h2 class="admin-page-title"
            th:text="${isEdit} ? 'Edit Product' : 'Add Product'">
        </h2>
        <p class="admin-page-sub"
           th:text="${isEdit} ? 'Update product details' :
                               'Add a new product to the store'">
        </p>
      </div>
      <a th:href="@{/admin/products}" class="sn-btn-outline">
        <i class="bi bi-arrow-left me-2"></i>Back
      </a>
    </div>

    <div class="admin-form-card">

      <form th:action="@{/admin/products/save}"
            method="post"
            th:object="${product}">

        <input type="hidden" th:field="*{id}">

        <div class="row g-3">

          <div class="col-md-6">
            <div class="sn-form-group">
              <label class="sn-form-label">Product Name *</label>
              <input type="text"
                     th:field="*{name}"
                     class="sn-form-input"
                     placeholder="e.g. Wireless Earbuds"
                     required>
            </div>
          </div>

          <div class="col-md-6">
            <div class="sn-form-group">
              <label class="sn-form-label">Category *</label>
              <select name="categoryId" class="sn-form-input" required>
                <option value="">Select a category</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${product.category != null and
                                       product.category.id == cat.id}">
                </option>
              </select>
            </div>
          </div>

          <div class="col-md-4">
            <div class="sn-form-group">
              <label class="sn-form-label">Price (₹) *</label>
              <input type="number"
                     th:field="*{price}"
                     class="sn-form-input"
                     placeholder="0.00"
                     step="0.01"
                     min="0"
                     required>
            </div>
          </div>

          <div class="col-md-4">
            <div class="sn-form-group">
              <label class="sn-form-label">Stock *</label>
              <input type="number"
                     th:field="*{stock}"
                     class="sn-form-input"
                     placeholder="0"
                     min="0"
                     required>
            </div>
          </div>

          <div class="col-md-4">
            <div class="sn-form-group">
              <label class="sn-form-label">Image URL</label>
              <input type="text"
                     th:field="*{imageUrl}"
                     class="sn-form-input"
                     placeholder="https://example.com/image.jpg"
                     oninput="previewImage(this.value)">
            </div>
          </div>

          <div class="col-12">
            <div class="sn-form-group">
              <label class="sn-form-label">Description</label>
              <textarea th:field="*{description}"
                        class="sn-form-input"
                        rows="3"
                        placeholder="Product description..."
                        style="resize:none;"></textarea>
            </div>
          </div>

          <!-- Image Preview -->
          <div class="col-12">
            <label class="sn-form-label">Image Preview</label>
            <img id="previewImg"
                 th:src="${product.imageUrl}"
                 style="width:120px; height:80px;
                        object-fit:cover; border-radius:10px;
                        border:1px solid var(--gray-200);"
                 onerror="this.style.display='none'"
                 th:style="${product.imageUrl == null} ?
                           'display:none' : ''">
          </div>

        </div>

        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="sn-submit-btn"
                  style="width:auto; padding:11px 32px;">
            <i class="bi bi-check-lg me-2"></i>
            <span th:text="${isEdit} ? 'Update Product' :
                                       'Add Product'"></span>
          </button>
          <a th:href="@{/admin/products}"
             class="sn-btn-outline">Cancel</a>
        </div>

      </form>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function previewImage(url) {
    const img = document.getElementById('previewImg');
    if (url) {
      img.src = url;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }
  }
</script>
</body>
</html>

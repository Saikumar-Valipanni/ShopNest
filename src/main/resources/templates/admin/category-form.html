<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${isEdit} ? 'Edit Category' : 'Add Category'">Category Form — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-layout">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <i class="bi bi-shield-check me-2"></i>Admin Panel
    </div>
    <nav class="admin-nav">
      <a th:href="@{/admin}" class="admin-nav-link">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a th:href="@{/admin/categories}"
         class="admin-nav-link active">
        <i class="bi bi-tag"></i> Categories
      </a>
      <a th:href="@{/admin/products}" class="admin-nav-link">
        <i class="bi bi-box-seam"></i> Products
      </a>
      <a th:href="@{/}" class="admin-nav-link">
        <i class="bi bi-shop"></i> View Store
      </a>
    </nav>
  </aside>

  <main class="admin-main">

    <div class="admin-page-header">
      <div>
        <h2 class="admin-page-title"
            th:text="${isEdit} ? 'Edit Category' : 'Add Category'">
        </h2>
        <p class="admin-page-sub"
           th:text="${isEdit} ? 'Update category details' :
                               'Create a new product category'">
        </p>
      </div>
      <a th:href="@{/admin/categories}" class="sn-btn-outline">
        <i class="bi bi-arrow-left me-2"></i>Back
      </a>
    </div>

    <div class="admin-form-card">

      <form th:action="@{/admin/categories/save}"
            method="post"
            th:object="${category}">

        <!-- hidden id for edit -->
        <input type="hidden" th:field="*{id}">

        <div class="row g-3">

          <div class="col-md-6">
            <div class="sn-form-group">
              <label class="sn-form-label">Category Name *</label>
              <input type="text"
                     th:field="*{name}"
                     class="sn-form-input"
                     placeholder="e.g. Electronics"
                     required>
            </div>
          </div>

          <div class="col-md-6">
            <div class="sn-form-group">
              <label class="sn-form-label">Image URL</label>
              <input type="text"
                     th:field="*{imageUrl}"
                     class="sn-form-input"
                     placeholder="https://example.com/image.jpg"
                     id="imageUrlInput"
                     oninput="previewImage(this.value)">
            </div>
          </div>

          <!-- Image Preview -->
          <div class="col-12">
            <div id="imagePreview"
                 th:if="${category.imageUrl != null}"
                 style="margin-top:8px;">
              <p class="sn-form-label">Image Preview</p>
              <img th:src="${category.imageUrl}"
                   id="previewImg"
                   style="width:120px; height:80px;
                          object-fit:cover; border-radius:10px;
                          border:1px solid var(--gray-200);">
            </div>
            <div id="imagePreview"
                 th:if="${category.imageUrl == null}">
              <p class="sn-form-label">Image Preview</p>
              <img src=""
                   id="previewImg"
                   style="width:120px; height:80px;
                          object-fit:cover; border-radius:10px;
                          border:1px solid var(--gray-200);
                          display:none;">
            </div>
          </div>

        </div>

        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="sn-submit-btn"
                  style="width:auto; padding:11px 32px;">
            <i class="bi bi-check-lg me-2"></i>
            <span th:text="${isEdit} ? 'Update Category' :
                                       'Add Category'"></span>
          </button>
          <a th:href="@{/admin/categories}"
             class="sn-btn-outline">Cancel</a>
        </div>

      </form>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function previewImage(url) {
    const img = document.getElementById('previewImg');
    if (url) {
      img.src = url;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — Admin — ShopNest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/shopnest.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-layout">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <i class="bi bi-shield-check me-2"></i>Admin Panel
    </div>
    <nav class="admin-nav">
      <a th:href="@{/admin}" class="admin-nav-link">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a th:href="@{/admin/categories}"
         class="admin-nav-link active">
        <i class="bi bi-tag"></i> Categories
      </a>
      <a th:href="@{/admin/products}" class="admin-nav-link">
        <i class="bi bi-box-seam"></i> Products
      </a>
      <a th:href="@{/}" class="admin-nav-link">
        <i class="bi bi-shop"></i> View Store
      </a>
    </nav>
  </aside>

  <main class="admin-main">

    <div class="admin-page-header">
      <div>
        <h2 class="admin-page-title">Categories</h2>
        <p class="admin-page-sub">Manage your store categories</p>
      </div>
      <a th:href="@{/admin/categories/add}"
         class="sn-btn-primary">
        <i class="bi bi-plus-lg me-2"></i>Add Category
      </a>
    </div>

    <div class="sn-alert-success"
         th:if="${successMessage}"
         th:text="${successMessage}">
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Image</th>
            <th>Name</th>
            <th>Image URL</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}"></td>
            <td>
              <img th:src="${cat.imageUrl}"
                   th:alt="${cat.name}"
                   style="width:48px; height:48px;
                          border-radius:10px; object-fit:cover;
                          border:1px solid var(--gray-200);"
                   onerror="this.src='https://picsum.photos/seed/default/400/300'">
            </td>
            <td>
              <span th:text="${cat.name}"
                    style="font-weight:600;"></span>
            </td>
            <td>
              <span th:text="${cat.imageUrl}"
                    style="font-size:12px; color:var(--gray-400);
                           max-width:220px; overflow:hidden;
                           text-overflow:ellipsis; white-space:nowrap;
                           display:block;">
              </span>
            </td>
            <td>
              <div class="d-flex gap-2">
                <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                   class="admin-btn-edit">
                  <i class="bi bi-pencil"></i> Edit
                </a>
                <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}"
                      method="post"
                      onsubmit="return confirm('Delete this category?')">
                  <button type="submit" class="admin-btn-delete">
                    <i class="bi bi-trash"></i> Delete
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
